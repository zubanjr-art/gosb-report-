<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Система отчетности ГОСБ</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; bg-color: #f4f6f9; color: #333; background: #f4f6f9; min-height: 100vh; display: flex; flex-direction: column; }
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .card { background: white; padding: 30px 20px; rounded-radius: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 340px; text-align: center; border: 1px solid #eaeaea; }
        h1 { font-size: 20px; margin-bottom: 5px; color: #111; }
        p { font-size: 13px; color: #888; margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; text-align: center; margin-bottom: 15px; outline: none; transition: border 0.2s; }
        input:focus { border-color: #107c41; }
        button { width: 100%; padding: 14px; background: #107c41; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button:active { background: #0b592e; }
        .error { color: #e03e3e; font-size: 13px; margin-top: 10px; display: none; }
        
        #main-screen { display: none; background: white; max-width: 414px; margin: 0 auto; width: 100%; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background: #107c41; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { font-size: 16px; font-weight: 600; }
        .header p { color: rgba(255,255,255,0.8); margin: 0; font-size: 11px; }
        .logout-btn { background: none; box-shadow: none; padding: 5px 10px; width: auto; font-size: 13px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-title { font-size: 16px; font-weight: 700; color: #222; margin-bottom: 15px; border-left: 4px solid #107c41; padding-left: 8px; text-align: left; }
        label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 5px; text-align: left; }
        
        .nav-bar { border-t: 1px solid #eee; background: #f9f9f9; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; }
        .nav-item { background: none; border: none; box-shadow: none; color: #888; width: 33%; padding: 5px; font-size: 12px; display: flex; flex-direction: column; align-items: center; font-weight: 500; }
        .nav-item.active { color: #107c41; font-weight: 700; }
        
        .report-card { background: #f8f9fa; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #edf0f2; text-align: left; }
        .report-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .progress-bar { width: 100%; background: #e9ecef; height: 8px; border-radius: 4px; overflow: hidden; }
        .progress-fill { background: #f1a80a; height: 100%; width: 0%; }
        .pct-label { text-align: right; font-size: 10px; color: #999; margin-top: 3px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="card">
            <h1 style="margin-bottom: 8px;">Система отчетности ГОСБ</h1>
            <p>Введите ваш код доступа</p>
            <input type="password" id="pin-input" inputmode="numeric" placeholder="••••">
            <button id="login-trigger">Войти</button>
            <div id="auth-error" class="error">Неверный код доступа</div>
        </div>
    </div>

    <div id="main-screen">
        <div class="header">
            <div>
                <h2 id="user-role-title">Панель управления</h2>
                <p id="user-sub-title">Загрузка...</p>
            </div>
            <button id="logout-trigger" class="logout-btn">Выйти</button>
        </div>

        <div class="content">
            <div id="tab-morning" class="tab-content">
                <div class="tab-title">Установить утренний план</div>
                <label>Выберите ВСП:</label>
                <select id="plan-vsp-select"></select>
                <label>План по Кредитам (млн руб):</label>
                <input type="number" id="plan-credits" value="0">
                <button id="save-plan-trigger">Зафиксировать план</button>
            </div>

            <div id="tab-evening" class="tab-content">
                <div class="tab-title">Отправить вечерний итог</div>
                <p id="vsp-fixed-label" style="text-align: left; color: #444; font-weight: 600;"></p>
                <label>Выдано Кредитов за день (млн руб):</label>
                <input type="number" id="fact-credits" value="0">
                <button id="save-fact-trigger" style="background: #2b6cb0;">Отправить факт в базу</button>
            </div>

            <div id="tab-analytics" class="tab-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <div class="tab-title" style="margin-bottom: 0;">Сводная аналитика ГОСБ</div>
                    <span id="refresh-analytics" style="cursor:pointer; font-size: 18px;">🔄</span>
                </div>
                <div id="leaderboard-container"></div>
            </div>
        </div>

        <div id="bottom-nav" class="nav-bar">
            <button id="nav-btn-morning" class="nav-item">☀️<span>Утро</span></button>
            <button id="nav-btn-evening" class="nav-item">🌙<span>Вечер</span></button>
            <button id="nav-btn-analytics" class="nav-item">📊<span>Аналитика</span></button>
        </div>
    </div>

    <script>
        // Чистый нативный JavaScript без внешних библиотек
        const URL_API = "https://clgcmdwzofskgcorptes.supabase.co/rest/v1/gosb_reports";
        const KEY_API = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNsZ2NtZHd6b2Zza2djb3JwdGVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTY4ODQwOTAsImV4cCI6MjAzMjQ1OTY5MH0.z-Z8A8nAnW6hF2-XgT-1G09K609Zf_V_M3I3v-F8v1Y";

        const users = {
            "7777": { role: "admin", name: "Администратор ГОСБ", vsp: "ГОСБ 8586" },
            "0303": { role: "vsp", name: "Офис 8586/03", vsp: "8586/03" },
            "1212": { role: "vsp", name: "Офис 8586/12", vsp: "8586/12" },
            "5555": { role: "vsp", name: "Офис 8586/55", vsp: "8586/55" }
        };
        const listVSP = ["8586/03", "8586/12", "8586/55"];
        let userActive = null;

        // Заполнение выпадающего списка ВСП
        const selectVSP = document.getElementById("plan-vsp-select");
        listVSP.forEach(v => {
            let o = document.createElement("option"); o.value = v; o.textContent = v; selectVSP.appendChild(o);
        });

        // Назначение кликов
        document.getElementById("login-trigger").addEventListener("click", login);
        document.getElementById("logout-trigger").addEventListener("click", logout);
        document.getElementById("save-plan-trigger").addEventListener("click", savePlan);
        document.getElementById("save-fact-trigger").addEventListener("click", saveFact);
        document.getElementById("refresh-analytics").addEventListener("click", loadData);
        
        document.getElementById("nav-btn-morning").addEventListener("click", () => changeTab('morning'));
        document.getElementById("nav-btn-evening").addEventListener("click", () => changeTab('evening'));
        document.getElementById("nav-btn-analytics").addEventListener("click", () => changeTab('analytics'));

        function login() {
            const pin = document.getElementById("pin-input").value;
            if (users[pin]) {
                userActive = users[pin];
                document.getElementById("auth-screen").style.display = "none";
                document.getElementById("main-screen").style.display = "flex";
                
                document.getElementById("user-role-title").textContent = userActive.name;
                document.getElementById("user-sub-title").textContent = userActive.vsp;

                if (userActive.role !== "admin") {
                    document.getElementById("nav-btn-morning").style.display = "none";
                    document.getElementById("vsp-fixed-label").textContent = `Ваше подразделение: ${userActive.vsp}`;
                    changeTab("evening");
                } else {
                    document.getElementById("nav-btn-morning").style.display = "flex";
                    changeTab("morning");
                }
                loadData();
            } else {
                const el = document.getElementById("auth-error");
                el.style.display = "block";
                setTimeout(() => el.style.display = "none", 3000);
            }
        }

        function logout() {
            userActive = null;
            document.getElementById("pin-input").value = "";
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("auth-screen").style.display = "flex";
        }

        function changeTab(t) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.remove("active"));
            document.getElementById(`tab-${t}`).classList.add("active");
            
            document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
            document.getElementById(`nav-btn-${t}`).classList.add("active");
        }

        function getToday() { return new Date().toISOString().split('T')[0]; }

        function sendRequest(data) {
            return fetch(URL_API, {
                method: 'POST',
                headers: { 'apikey': KEY_API, 'Authorization': `Bearer ${KEY_API}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
                body: JSON.stringify(data)
            });
        }

        function savePlan() {
            const vsp = document.getElementById("plan-vsp-select").value;
            const val = parseFloat(document.getElementById("plan-credits").value) || 0;
            sendRequest({ vsp_number: vsp, report_date: getToday(), plan_credits: val })
                .then(res => { if(res.ok) { alert("План зафиксирован!"); loadData(); } else alert("Ошибка"); });
        }

        function saveFact() {
            const val = parseFloat(document.getElementById("fact-credits").value) || 0;
            sendRequest({ vsp_number: userActive.vsp, report_date: getToday(), fact_credits: val })
                .then(res => { if(res.ok) { alert("Данные отправлены!"); loadData(); } else alert("Ошибка"); });
        }

        function loadData() {
            const box = document.getElementById("leaderboard-container");
            box.innerHTML = '<p style="text-align:center; padding:10px;">Загрузка данных...</p>';
            
            fetch(`${URL_API}?report_date=eq.${getToday()}`, {
                method: 'GET', headers: { 'apikey': KEY_API, 'Authorization': `Bearer ${KEY_API}` }
            })
            .then(res => res.json())
            .then(data => {
                box.innerHTML = "";
                listVSP.forEach(vsp => {
                    const r = data.find(item => item.vsp_number === vsp) || { plan_credits: 0, fact_credits: 0 };
                    const pct = r.plan_credits > 0 ? Math.min(Math.round((r.fact_credits / r.plan_credits) * 100), 100) : 0;
                    
                    box.innerHTML += `
                        <div class="report-card">
                            <div class="report-meta">
                                <span>ВСП ${vsp}</span>
                                <span style="color:#666;">Ф: ${r.fact_credits} / П: ${r.plan_credits} млн</span>
                            </div>
                            <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
                            <div class="pct-label">Выполнение: ${pct}%</div>
                        </div>
                    `;
                });
            }).catch(() => { box.innerHTML = '<p style="color:red;">Ошибка соединения</p>'; });
        }
    </script>
</body>
</html>
