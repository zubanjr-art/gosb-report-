<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг ЦКП</title>
    <style>
        :root { --primary: #388e3c; --primary-light: #e8f5e9; --bg: #f5f5f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: var(--bg); color: #333; padding-bottom: 80px; }
        .header { background: #00796b; color: white; padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 6px 16px; color: white; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .auth-container { max-width: 400px; margin: 60px auto; padding: 30px 20px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .pin-input { width: 100%; padding: 15px; font-size: 24px; text-align: center; letter-spacing: 8px; border: 2px solid #e0e0e0; border-radius: 12px; margin-bottom: 20px; background: #fafafa; }
        .container { max-width: 500px; margin: 15px auto; padding: 0 12px; display: none; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.03); margin-bottom: 15px; }
        .metric-tabs { display: flex; background: #e0e0e0; padding: 4px; border-radius: 12px; margin-bottom: 15px; justify-content: space-between; }
        .metric-tab { flex: 1; padding: 8px; text-align: center; background: none; border: none; font-size: 13px; font-weight: bold; color: #666; cursor: pointer; border-radius: 8px; }
        .metric-tab.active { background: white; color: #333; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .block-title { font-size: 14px; font-weight: bold; color: #ef6c00; margin-bottom: 12px; text-transform: uppercase; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; text-align: left; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; }
        select.form-control { background: #fff; }
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .summary-flex { display: flex; gap: 10px; margin-bottom: 15px; }
        .summary-card { flex: 1; background: #fafafa; border: 1px solid #eee; padding: 12px; border-radius: 12px; text-align: center; }
        .tp-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #fafafa; border-radius: 12px; margin-bottom: 8px; border: 1px solid #eee; }
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; border-top: 1px solid #e0e0e0; display: flex; justify-content: space-around; align-items: center; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #999; background: none; border: none; font-size: 12px; cursor: pointer; width: 25%; }
        .nav-item.active { color: #00796b; font-weight: bold; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #333; color: white; padding: 10px 20px; border-radius: 30px; font-size: 13px; transition: 0.3s; z-index: 2000; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="auth-screen" class="auth-container">
        <h2 style="color: var(--primary); margin-bottom: 10px; font-size: 24px;">Мониторинг ЦКП</h2>
        <p style="font-size: 14px; color: #666; margin-bottom: 25px;">Введите ПИН-код вашей точки продаж</p>
        <input type="password" id="pin-code" class="pin-input" inputmode="numeric" placeholder="••••" maxlength="4">
        <button class="btn-submit" onclick="login()">Войти в систему</button>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="header">
            <div>
                <h1 id="user-title" style="font-size: 16px;">Загрузка...</h1>
                <span id="user-vsp" style="font-size: 12px; opacity: 0.8;"></span>
            </div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="container" id="tab-morning">
            <div class="card">
                <div class="block-title" style="color: var(--primary);">☀️ Утренний прогноз по ЦКП</div>
                <div class="form-group"><label>Прогноз Кредиты (тыс. руб):</label><input type="number" id="m-kred" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>Прогноз ЧКД (шт):</label><input type="number" id="m-chkd" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>Прогноз Доверие (шт):</label><input type="number" id="m-doverie" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>Прогноз НКК (шт):</label><input type="number" id="m-nkk" class="form-control" placeholder="0"></div>
                <button class="btn-submit" onclick="sendData('Утро')">Сохранить прогноз</button>
            </div>
        </div>

        <div class="container" id="tab-evening">
            <div class="card">
                <div class="block-title" style="color: #1565c0;">🌙 Фактические итоги дня ВСП</div>
                <div class="form-group"><label>Факт Кредиты (тыс. руб):</label><input type="number" id="e-kred" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>Факт ЧКД (шт):</label><input type="number" id="e-chkd" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>Факт Доверие (шт):</label><input type="number" id="e-doverie" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>Факт НКК (шт):</label><input type="number" id="e-nkk" class="form-control" placeholder="0"></div>
                <button class="btn-submit" style="background: #1565c0;" onclick="sendData('Вечер')">Отправить итоги дня</button>
            </div>
        </div>

        <div class="container" id="tab-admin">
            <div class="card">
                <div class="block-title">⚙️ Установка недельных планов</div>
                <div class="form-group">
                    <label>Выберите ВСП:</label>
                    <select id="adm-tp-select" class="form-control"></select>
                </div>
                <div class="form-group"><label>План Кредиты (тыс руб):</label><input type="number" id="p-kred" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>План ЧКД (шт):</label><input type="number" id="p-chkd" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>План Доверие (шт):</label><input type="number" id="p-doverie" class="form-control" placeholder="0"></div>
                <div class="form-group"><label>План НКК (шт):</label><input type="number" id="p-nkk" class="form-control" placeholder="0"></div>
                <button class="btn-submit" style="background: #ef6c00;" onclick="sendWeeklyPlan()">Утвердить план</button>
            </div>
        </div>

        <div class="container" id="tab-dashboard">
            <div class="metric-tabs">
                <button class="metric-tab active" id="btn-m-kred" onclick="changeMetric('kred')">Кредиты</button>
                <button class="metric-tab" id="btn-m-chkd" onclick="changeMetric('chkd')">ЧКД</button>
                <button class="metric-tab" id="btn-m-doverie" onclick="changeMetric('doverie')">Доверие</button>
                <button class="metric-tab" id="btn-m-nkk" onclick="changeMetric('nkk')">НКК</button>
            </div>

            <div class="card">
                <div class="summary-flex">
                    <div class="summary-card">
                        <div style="font-size:11px; color:#666;">Общая картина (Сегодня)</div>
                        <div style="font-size:14px; font-weight:bold; margin-top:4px;">
                            <span style="color:green;" id="dash-total-fact">Ф: 0</span> / 
                            <span style="color:purple;" id="dash-total-prog">Пр: 0</span>
                        </div>
                    </div>
                    <div class="summary-card">
                        <div style="font-size:11px; color:#666;">Общий План недели</div>
                        <div style="font-size:16px; font-weight:bold; color:#333; margin-top:4px;" id="dash-total-plan">0</div>
                    </div>
                </div>

                <div id="tp-list-container"></div>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-item" id="nav-morning" onclick="switchTab('morning')">☀️ Утро</button>
            <button class="nav-item" id="nav-evening" onclick="switchTab('evening')">🌙 Вечер</button>
            <button class="nav-item" id="nav-admin" onclick="switchTab('admin')">⚙️ Планы</button>
            <button class="nav-item" id="nav-dashboard" onclick="switchTab('dashboard')">📊 Аналитика</button>
        </div>
    </div>

    <script>
        const USERS_DB = {
            "8502": { role: "user", tp: "ВСП 8586/02", title: "Руководитель ВСП 8586/02" },
            "8503": { role: "user", tp: "ВСП 8586/03", title: "Руководитель ВСП 8586/03" },
            "8504": { role: "user", tp: "ВСП 8586/04", title: "Руководитель ВСП 8586/04" },
            "1234": { role: "admin", tp: "ГОСБ", title: "Администратор ГОСБ" }
        };

        const ALL_VSPS = Object.values(USERS_DB).filter(u => u.role === "user").map(u => u.tp).sort();
        
        // ======= ЗАМЕНИТЕ ЭТОТ URL НА СВОЙ ПОСЛЕ ПЕРЕРАЗВЕРТЫВАНИЯ B Google Scripts! =======
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/ВАШ_НОВЫЙ_ID/exec"; 

        let currentUser = null;
        let serverWeeklyPlans = {};
        let serverReports = [];
        let currentMetric = 'kred';

        window.addEventListener("DOMContentLoaded", () => {
            const savedPin = localStorage.getItem("vsp_session_pin");
            if (savedPin && USERS_DB[savedPin]) {
                currentUser = USERS_DB[savedPin];
                initInterface();
            }
            const sel = document.getElementById("adm-tp-select");
            sel.innerHTML = "";
            ALL_VSPS.forEach(tp => { sel.innerHTML += `<option value="${tp}">${tp}</option>`; });
        });

        function login() {
            const pin = document.getElementById("pin-code").value.trim();
            if (USERS_DB[pin]) {
                localStorage.setItem("vsp_session_pin", pin);
                currentUser = USERS_DB[pin];
                initInterface();
            } else { showToast("Неверный ПИН-код!"); }
        }

        function logout() {
            localStorage.removeItem("vsp_session_pin");
            currentUser = null;
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("auth-screen").style.display = "block";
        }

        function showToast(text) {
            const t = document.getElementById("toast"); t.innerText = text;
            t.className = "toast show"; setTimeout(() => t.className = "toast", 3000);
        }

        function initInterface() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("user-title").innerText = currentUser.title;
            document.getElementById("user-vsp").innerText = currentUser.tp;
            
            if(currentUser.role === 'admin') {
                document.getElementById("nav-morning").style.display = "none";
                document.getElementById("nav-evening").style.display = "none";
                document.getElementById("nav-admin").style.display = "flex";
                switchTab('dashboard');
            } else {
                document.getElementById("nav-morning").style.display = "flex";
                document.getElementById("nav-evening").style.display = "flex";
                document.getElementById("nav-admin").style.display = "none";
                switchTab('morning');
            }
            reloadData();
        }

        function reloadData() {
            fetch(`${GOOGLE_SCRIPT_URL}?action=getDashboardAndPlans`)
            .then(res => res.json())
            .then(json => {
                if(json.plans) serverWeeklyPlans = json.plans;
                if(json.reports) serverReports = json.reports;
                calculateDashboard();
            }).catch(err => console.log("Синхронизация...", err));
        }

        function switchTab(id) {
            document.querySelectorAll(".container").forEach(c => c.style.display = 'none');
            document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
            document.getElementById("tab-" + id).style.display = 'block';
            document.getElementById("nav-" + id).classList.add("active");
            if(id === 'dashboard') calculateDashboard();
        }

        function changeMetric(metric) {
            currentMetric = metric;
            document.querySelectorAll(".metric-tab").forEach(b => b.classList.remove("active"));
            document.getElementById("btn-m-" + metric).classList.add("active");
            calculateDashboard();
        }

        function calculateDashboard() {
            let totalFact = 0, totalProg = 0, totalPlan = 0;
            let listHtml = "";

            ALL_VSPS.forEach(tp => {
                let planVal = (serverWeeklyPlans[tp] && serverWeeklyPlans[tp][currentMetric]) ? serverWeeklyPlans[tp][currentMetric] : 0;
                let factVal = 0, progVal = 0;

                serverReports.forEach(r => {
                    if (r.tp === tp && r.isToday) {
                        if (r.type === "Вечер") factVal += r[currentMetric] || 0;
                        if (r.type === "Утро") progVal += r[currentMetric] || 0;
                    }
                });

                totalFact += factVal; totalProg += progVal; totalPlan += planVal;
                let pct = planVal > 0 ? Math.round((factVal / planVal) * 100) : 0;
                let unit = currentMetric === 'kred' ? 'тыс.руб' : 'шт';

                listHtml += `<div class="tp-row">
                    <div>
                        <strong>${tp}</strong><br>
                        <span style="font-size:12px; color:#666;">Неделя: план ${planVal} ${unit}</span><br>
                        <span style="font-size:12px; color:#00796b;">Сегодня: Ф: ${factVal} / Пр: ${progVal}</span>
                    </div>
                    <span style="color:#388e3c; font-weight:bold; font-size:15px;">${pct}%</span>
                </div>`;
            });

            document.getElementById("tp-list-container").innerHTML = listHtml;
            document.getElementById("dash-total-fact").innerText = "Ф: " + totalFact;
            document.getElementById("dash-total-prog").innerText = "Пр: " + totalProg;
            document.getElementById("dash-total-plan").innerText = totalPlan + (currentMetric === 'kred' ? ' тыс руб' : ' шт');
        }

        function sendData(type) {
            let prefix = type === 'Утро' ? 'm-' : 'e-';
            let kred = document.getElementById(prefix + "kred").value || 0;
            let chkd = document.getElementById(prefix + "chkd").value || 0;
            let doverie = document.getElementById(prefix + "doverie").value || 0;
            let nkk = document.getElementById(prefix + "nkk").value || 0;

            let url = `${GOOGLE_SCRIPT_URL}?action=saveReport&vsp_number=${encodeURIComponent(currentUser.tp)}&report_type=${type}&kred=${kred}&chkd=${chkd}&doverie=${doverie}&nkk=${nkk}`;
            
            fetch(url, { mode: 'no-cors' })
            .then(() => {
                showToast(`${type} отчёт успешно отправлен!`);
                document.querySelectorAll(`.container input`).forEach(i => i.value = "");
                setTimeout(reloadData, 1000);
            });
        }

        function sendWeeklyPlan() {
            let tp = document.getElementById("adm-tp-select").value;
            let kred = document.getElementById("p-kred").value || 0;
            let chkd = document.getElementById("p-chkd").value || 0;
            let doverie = document.getElementById("p-doverie").value || 0;
            let nkk = document.getElementById("p-nkk").value || 0;

            let url = `${GOOGLE_SCRIPT_URL}?action=savePlans&vsp_number=${encodeURIComponent(tp)}&p_kred=${kred}&p_chkd=${chkd}&p_doverie=${doverie}&p_nkk=${nkk}`;
            
            fetch(url, { mode: 'no-cors' })
            .then(() => {
                showToast("Планы успешно обновлены!");
                setTimeout(reloadData, 1000);
            });
        }
    </script>
</body>
</html>
