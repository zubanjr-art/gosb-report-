<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оперативный мониторинг ЦКП</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-light: #e8f5e9;
            --text: #333;
            --bg: #f4f6f8;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; }
        
        /* Шапка */
        .header { background: var(--primary); color: white; padding: 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .header h1 { font-size: 20px; }
        .logout-btn { background: rgba(255,255,255,0.2); border: none; padding: 8px 15px; color: white; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        /* Авторизация */
        .auth-container { max-width: 400px; margin: 50px auto; padding: 25px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .auth-container h2 { margin-bottom: 20px; color: var(--primary); }
        .pin-input { width: 100%; padding: 15px; font-size: 24px; text-align: center; letter-spacing: 5px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; }
        
        /* Основной контент */
        .container { max-width: 600px; margin: 20px auto; padding: 0 15px; display: none; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: bold; color: var(--primary); margin-bottom: 15px; border-left: 4px solid var(--primary); padding-left: 10px; }
        
        .info-box { background: var(--primary-light); padding: 12px; border-radius: 10px; color: var(--primary); font-weight: 500; margin-bottom: 20px; font-size: 14px; }
        
        /* Поля ввода */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 6px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; font-size: 15px; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(46,125,50,0.1); }
        
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:active { background: #1b5e20; }
        
        /* Нижнее меню */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; font-size: 11px; cursor: pointer; background: none; border: none; width: 33%; height: 100%; justify-content: center; }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }
        
        /* Уведомления */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #323232; color: white; padding: 12px 25px; border-radius: 25px; font-size: 14px; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.3s ease; text-align: center; max-width: 90%; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.error { background: #d32f2f; }
        .toast.success { background: #388e3c; }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div id="auth-screen" class="auth-container">
        <h2>Вход в систему</h2>
        <p style="color: #666; margin-bottom: 15px; font-size: 14px;">Введите ПИН-код вашего подразделения</p>
        <input type="password" id="pin-code" class="pin-input" inputmode="numeric" pattern="[0-9]*" placeholder="••••" maxlength="4">
        <button class="btn-submit" onclick="login()">Войти</button>
    </div>

    <div id="main-screen" style="display: none;">
        <div class="header">
            <h1 id="user-title">Руководитель ВСП</h1>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>

        <div class="container" id="tab-morning" style="display: block;">
            <div class="card">
                <div class="card-title">Предоставить утренний прогноз на день</div>
                <div id="vsp-info-box" class="info-box">Закрепленный офис: ВСП ----</div>
                
                <div class="form-group" id="admin-vsp-group" style="display: none;">
                    <label for="morning-vsp-select">Выберите ВСП</label>
                    <select id="morning-vsp-select" class="form-control">
                        <option value="ВСП 8586/02">ВСП 8586/02</option>
                        <option value="ВСП 8586/03">ВСП 8586/03</option>
                        <option value="ВСП 8586/04">ВСП 8586/04</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Прогноз по Кредитам на сегодня (тыс руб):</label>
                    <input type="number" id="morning-credits" class="form-control" inputmode="numeric" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Прогноз по Уровню доверия на сегодня (шт):</label>
                    <input type="number" id="morning-ud" class="form-control" inputmode="numeric" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Прогноз по ЦКП Кредиты на сегодня (шт):</label>
                    <input type="number" id="morning-ckp-kred" class="form-control" inputmode="numeric" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Прогноз по НКК на сегодня (шт):</label>
                    <input type="number" id="morning-nkk" class="form-control" inputmode="numeric" placeholder="0">
                </div>

                <button class="btn-submit" onclick="saveMorningData()">Сохранить в базу</button>
            </div>
        </div>

        <div class="container" id="tab-evening">
            <div class="card">
                <div class="card-title">Фактические итоги за день (Вечер)</div>
                <p style="color: #666; font-size: 14px; text-align: center; padding: 20px 0;">Форма вечернего отчета находится в разработке.</p>
            </div>
        </div>

        <div class="container" id="tab-analytics">
            <div class="card">
                <div class="card-title">Аналитика и Выгрузка</div>
                <p style="color: #666; font-size: 14px; text-align: center; padding: 20px 0;">Модуль аналитики будет доступен после накопления данных.</p>
            </div>
        </div>

        <div class="nav-bar">
            <button class="nav-item active" onclick="switchTab('morning', this)">
                <div class="nav-icon">☀️</div>
                <div>Утро</div>
            </button>
            <button class="nav-item" onclick="switchTab('evening', this)">
                <div class="nav-icon">🌙</div>
                <div>Вечер</div>
            </button>
            <button class="nav-item" onclick="switchTab('analytics', this)">
                <div class="nav-icon">📊</div>
                <div>Аналитика</div>
            </button>
        </div>
    </div>

    <script>
        // Конфигурация пользователей по ПИН-кодам
        const USERS_DB = {
            "8586": { role: "user", vsp: "ВСП 8586/02", title: "Руководитель ВСП" },
            "1234": { role: "admin", vsp: "ГОСБ", title: "Администратор ГОСБ" }
        };

        // ТА САМАЯ ССЫЛКА НА GOOGLE APPS SCRIPT
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM5FlEWNGRAA2PYIsy1WCV-rkldeh36bvMDcdKhpIoAzlbL6VrSfktXJ7XCisCCaX1Kg/exec";

        let currentUser = null;

        // Всплывающие уведомления
        function showNotification(text, isError = false) {
            const toast = document.getElementById("toast");
            toast.innerText = text;
            toast.className = "toast show " + (isError ? "error" : "success");
            setTimeout(() => { toast.className = "toast"; }, 3500);
        }

        // Авторизация
        function login() {
            const pin = document.getElementById("pin-code").value.trim();
            if (USERS_DB[pin]) {
                currentUser = USERS_DB[pin];
                localStorage.setItem("user_session_pin", pin);
                initInterface();
            } else {
                showNotification("Неверный ПИН-код!", true);
            }
        }

        function initInterface() {
            document.getElementById("auth-screen").style.display = "none";
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("user-title").innerText = currentUser.title;
            
            const infoBox = document.getElementById("vsp-info-box");
            const adminGroup = document.getElementById("admin-vsp-group");

            if (currentUser.role === "admin") {
                infoBox.style.display = "none";
                adminGroup.style.display = "block";
            } else {
                infoBox.style.display = "block";
                infoBox.innerText = "Закрепленный офис: " + currentUser.vsp;
                adminGroup.style.display = "none";
            }
        }

        function logout() {
            localStorage.removeItem("user_session_pin");
            currentUser = null;
            document.getElementById("pin-code").value = "";
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("auth-screen").style.display = "block";
        }

        // Переключение вкладок меню
        function switchTab(tabId, element) {
            document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).style.display = 'block';
            element.classList.add('active');
        }

        // ОТПРАВКА ДАННЫХ В GOOGLE ТАБЛИЦУ
        async function saveMorningData() {
            const vsp = currentUser.role === "admin" ? document.getElementById("morning-vsp-select").value : currentUser.vsp;
            
            // Названия ключей должны точно совпадать со скриптом в Google
            const fields = {
                vsp_number: vsp,
                prog_credits: document.getElementById("morning-credits").value || "0",
                prog_ud: document.getElementById("morning-ud").value || "0",
                prog_ckp_kred: document.getElementById("morning-ckp-kred").value || "0",
                prog_nkk: document.getElementById("morning-nkk").value || "0"
            };

            showNotification("Отправка данных...");

            try {
                // Используем mode: 'no-cors' для полного обхода любых сетевых блокировок браузера
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(fields)
                });
                
                // Сбрасываем форму после успешной отправки
                document.getElementById("morning-credits").value = "";
                document.getElementById("morning-ud").value = "";
                document.getElementById("morning-ckp-kred").value = "";
                document.getElementById("morning-nkk").value = "";
                
                showNotification("Утренний прогноз успешно сохранен!");
            } catch (e) {
                showNotification("Ошибка сети: " + e.message, true);
            }
        }

        // Проверка сессии при загрузке страницы
        window.onload = function() {
            const savedPin = localStorage.getItem("user_session_pin");
            if (savedPin && USERS_DB[savedPin]) {
                currentUser = USERS_DB[savedPin];
                initInterface();
            }
        };
    </script>
</body>
</html>
