<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Система отчетности ГОСБ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .hidden { display: none !important; }
        input:focus, select:focus { outline: none; border-color: #059669; }
        .section-title { @apply text-xs font-bold text-emerald-700 bg-emerald-50/50 p-2 rounded-lg mb-2 mt-3 block; }
        .sub-label { @apply block text-[11px] font-medium text-gray-500 mb-1 pl-1; }
        .num-input { @apply w-full px-3 py-2 bg-gray-50 border border-gray-200 rounded-xl text-sm transition-all focus:bg-white; }
        
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-20px);
            z-index: 9999; opacity: 0; pointer-events: none; transition: all 0.3s ease;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800 antialiased">

    <div id="toast" class="flex items-center space-x-2 px-4 py-3 rounded-2xl shadow-xl border text-xs font-semibold max-w-xs w-full bg-emerald-50 border-emerald-200 text-emerald-700">
        <span id="toast-text"></span>
    </div>

    <div id="auth-screen" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 max-w-sm w-full text-center">
            <div class="mx-auto w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center mb-6">
                <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-1">Система отчетности ГОСБ</h2>
            <p class="text-sm text-gray-400 mb-6">Введите код доступа</p>
            <input type="password" id="pin-input" maxlength="6" placeholder="••••••" class="w-full text-center text-2xl tracking-widest px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl mb-4">
            <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white font-semibold py-3.5 rounded-2xl shadow-lg active:scale-[0.98] transition-all">Войти</button>
        </div>
    </div>

    <div id="main-screen" class="min-h-screen flex flex-col hidden pb-24">
        <header class="bg-emerald-700 text-white px-5 pt-4 pb-4 rounded-b-[2.5rem] shadow-lg sticky top-0 z-50 flex justify-between items-start">
            <div>
                <h1 id="user-role-title" class="text-lg font-bold">Загрузка...</h1>
                <p id="user-sub-title" class="text-xs text-emerald-100 mt-0.5">ВСП</p>
            </div>
            <button onclick="handleLogout()" class="text-xs bg-emerald-800/50 px-3 py-1.5 rounded-xl">Выйти</button>
        </header>

        <main class="flex-grow p-4 max-w-md mx-auto w-full space-y-4">
            <div id="tab-content-morning" class="tab-content space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                    <div class="border-l-4 border-emerald-600 pl-3"><h3 id="morning-tab-title" class="font-bold text-gray-800 text-sm">Ввод плановых данных</h3></div>
                    <div id="vsp-selection-block-morning" class="hidden">
                        <select id="morning-vsp-select" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-xs"></select>
                    </div>
                    <div id="vsp-fixed-label-morning" class="text-xs font-semibold text-emerald-700 bg-emerald-50 p-2.5 rounded-xl hidden"></div>
                    <div class="grid grid-cols-1 gap-3">
                        <div><label id="label-credits" class="block text-xs font-semibold text-gray-500 mb-1">Кредиты:</label><input type="number" id="morning-credits" placeholder="0" class="num-input"></div>
                        <div><label id="label-chkd" class="block text-xs font-semibold text-gray-500 mb-1">Уровень доверия:</label><input type="number" id="morning-ud" placeholder="0" class="num-input"></div>
                        <div><label id="label-trust" class="block text-xs font-semibold text-gray-500 mb-1">ЦКП Кредиты:</label><input type="number" id="morning-ckp-kred" placeholder="0" class="num-input"></div>
                        <div><label id="label-nkk" class="block text-xs font-semibold text-gray-500 mb-1">НКК:</label><input type="number" id="morning-nkk" placeholder="0" class="num-input"></div>
                    </div>
                    <button onclick="saveMorningData()" class="w-full bg-emerald-600 text-white font-medium py-3 rounded-xl shadow-md active:scale-[0.99] transition-all text-xs">Сохранить в базу</button>
                </div>
            </div>

            <div id="tab-content-evening" class="tab-content space-y-4 hidden">
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100 space-y-4">
                    <div class="border-l-4 border-blue-600 pl-3"><h3 class="font-bold text-gray-800 text-sm">Внести фактические итоги</h3></div>
                    <div id="vsp-selection-block-evening" class="hidden">
                        <select id="evening-vsp-select" class="w-full px-3 py-2.5 bg-gray-50 border border-gray-200 rounded-xl text-xs"></select>
                    </div>
                    <form id="evening-form" class="space-y-3">
                        <div>
                            <span class="section-title">1. Встречи за день</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="sub-label">Всего встреч:</label><input type="number" id="f_vst_all" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">Кат. А и Б:</label><input type="number" id="f_vst_ab" placeholder="0" class="num-input"></div>
                            </div>
                        </div>
                        <div>
                            <span class="section-title">2. Уровень доверия</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="sub-label">Всего УД:</label><input type="number" id="f_ud_all" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">ПУ РБ:</label><input type="number" id="f_ud_purb" placeholder="0" class="num-input"></div>
                            </div>
                        </div>
                        <div>
                            <span class="section-title">3. Фокусные ЦКП</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="sub-label">БК:</label><input type="number" id="f_ckp_bk" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">Эквайринг:</label><input type="number" id="f_ckp_ekv" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">КП:</label><input type="number" id="f_ckp_kp" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">БГ:</label><input type="number" id="f_ckp_bg" placeholder="0" class="num-input"></div>
                                <div class="col-span-2"><label class="sub-label">КРЕДИТЫ:</label><input type="number" id="f_ckp_kred" placeholder="0" class="num-input"></div>
                            </div>
                        </div>
                        <div>
                            <span class="section-title">4 & 5. Кредитование</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="sub-label">Создано:</label><input type="number" id="f_kred_created" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">Выдано:</label><input type="number" id="f_kred_issued" placeholder="0" class="num-input"></div>
                            </div>
                        </div>
                        <div>
                            <span class="section-title">Остальные показатели</span>
                            <div class="grid grid-cols-2 gap-2">
                                <div><label class="sub-label">НКК:</label><input type="number" id="f_nkk_all" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">Лизинг:</label><input type="number" id="f_lead_leasing" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">ВЭД:</label><input type="number" id="f_lead_ved" placeholder="0" class="num-input"></div>
                                <div><label class="sub-label">Сберфест:</label><input type="number" id="f_sberfest" placeholder="0" class="num-input"></div>
                            </div>
                        </div>
                    </form>
                    <button onclick="saveEveningData()" class="w-full bg-blue-600 text-white font-medium py-3 rounded-xl shadow-md text-xs">Отправить вечерний факт</button>
                </div>
            </div>

            <div id="tab-content-analytics" class="tab-content space-y-4 hidden">
                <div class="bg-white p-5 rounded-3xl shadow-sm text-center text-xs text-gray-500">
                    Аналитическая матрица синхронизирована с базой Supabase.
                </div>
            </div>
        </main>

        <nav id="bottom-nav" class="bg-white/95 border-t fixed bottom-0 left-0 right-0 h-16 flex items-center justify-around z-50 max-w-md mx-auto shadow-xl">
            <button id="nav-btn-morning" onclick="switchTab('morning')" class="flex flex-col items-center text-gray-400"><span class="text-[10px] font-medium">Утро</span></button>
            <button id="nav-btn-evening" onclick="switchTab('evening')" class="flex flex-col items-center text-gray-400"><span class="text-[10px] font-medium">Вечер</span></button>
            <button id="nav-btn-analytics" onclick="switchTab('analytics')" class="flex flex-col items-center text-gray-400"><span class="text-[10px] font-medium">Аналитика</span></button>
        </nav>
    </div>

    <script>
        const SUPABASE_REST_URL = "https://ppjhkgscggocnxvacxjf.supabase.co/rest/v1/daily_reports";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBwamhrZ3NjZ29jbnh2YWN4amYiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTtxNjg4NDA5MCwiZXhwIjoyMDMyNDU5NjkwfQ.z-Z8A8nAnW6hF2-XgT-1G09K609Zf_V_M3I3v-F8v1Y";

        const usersDB = {
            "777777": { role: "admin", name: "Администратор ГОСБ", vsp: "ГОСБ 8586" },
            "858602": { role: "vsp", name: "Руководитель ВСП 8586/02", vsp: "8586/02" }
        };

        const vspList = ["8586/02"];
        let currentUser = null;

        function showNotification(message, isError = false) {
            const toast = document.getElementById("toast");
            const text = document.getElementById("toast-text");
            text.textContent = message;
            toast.className = `fixed top-20 left-1/2 -translate-x-1/2 px-4 py-3 rounded-2xl shadow-xl text-xs font-semibold z-50 border transition-all duration-300 ${isError ? 'bg-red-50 border-red-200 text-red-700' : 'bg-emerald-50 border-emerald-200 text-emerald-700'} show`;
            setTimeout(() => toast.classList.remove("show"), 3000);
        }

        function handleLogin() {
            const pin = document.getElementById("pin-input").value;
            if (usersDB[pin]) {
                currentUser = usersDB[pin];
                document.getElementById("auth-screen").classList.add("hidden");
                document.getElementById("main-screen").classList.remove("hidden");
                document.getElementById("user-role-title").textContent = currentUser.name;
                document.getElementById("user-sub-title").textContent = currentUser.vsp;
                
                if(currentUser.role === "admin") {
                    document.getElementById("vsp-selection-block-morning").classList.remove("hidden");
                } else {
                    document.getElementById("vsp-fixed-label-morning").textContent = `Закрепленный офис: ВСП ${currentUser.vsp}`;
                    document.getElementById("vsp-fixed-label-morning").classList.remove("hidden");
                }
                switchTab("morning");
            } else {
                showNotification("Неверный код доступа", true);
            }
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById("main-screen").classList.add("hidden");
            document.getElementById("auth-screen").classList.remove("hidden");
        }

        function switchTab(tabName) {
            document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hidden"));
            document.getElementById(`tab-content-${tabName}`).classList.remove("hidden");
        }

        async function saveMorningData() {
            const vsp = currentUser.role === "admin" ? document.getElementById("morning-vsp-select").value : currentUser.vsp;
            const today = new Date().toISOString().split('T')[0];
            
            const fields = {
                report_date: today,
                vsp_number: vsp,
                prog_credits: parseFloat(document.getElementById("morning-credits").value) || 0,
                prog_ud: parseInt(document.getElementById("morning-ud").value) || 0,
                prog_ckp_kred: parseInt(document.getElementById("morning-ckp-kred").value) || 0,
                prog_nkk: parseInt(document.getElementById("morning-nkk").value) || 0
            };

            try {
                const response = await fetch(SUPABASE_REST_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(fields)
                });
                if (response.ok) {
                    showNotification("Утренний прогноз сохранен!");
                } else {
                    showNotification("Ошибка сохранения на стороне сервера.", true);
                }
            } catch (e) {
                showNotification("Ошибка сети.", true);
            }
        }

        async function saveEveningData() {
            const vsp = currentUser.role === "admin" ? document.getElementById("evening-vsp-select").value : currentUser.vsp;
            const today = new Date().toISOString().split('T')[0];

            const fields = {
                report_date: today,
                vsp_number: vsp,
                vst_all: parseInt(document.getElementById("f_vst_all").value) || 0,
                vst_ab: parseInt(document.getElementById("f_vst_ab").value) || 0,
                ud_all: parseInt(document.getElementById("f_ud_all").value) || 0,
                ud_purb: parseInt(document.getElementById("f_ud_purb").value) || 0,
                ckp_bk: parseInt(document.getElementById("f_ckp_bk").value) || 0,
                ckp_ekv: parseInt(document.getElementById("f_ckp_ekv").value) || 0,
                ckp_kp: parseInt(document.getElementById("f_ckp_kp").value) || 0,
                ckp_bg: parseInt(document.getElementById("f_ckp_bg").value) || 0,
                ckp_kred: parseInt(document.getElementById("f_ckp_kred").value) || 0,
                kred_created: parseFloat(document.getElementById("f_kred_created").value) || 0,
                kred_issued: parseFloat(document.getElementById("f_kred_issued").value) || 0,
                nkk_all: parseInt(document.getElementById("f_nkk_all").value) || 0,
                lead_leasing: parseInt(document.getElementById("f_lead_leasing").value) || 0,
                lead_ved: parseInt(document.getElementById("f_lead_ved").value) || 0,
                sberfest: parseInt(document.getElementById("f_sberfest").value) || 0
            };

            try {
                const response = await fetch(SUPABASE_REST_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(fields)
                });
                if (response.ok) {
                    showNotification("Вечерний факт сохранен!");
                    document.getElementById("evening-form").reset();
                } else {
                    showNotification("Ошибка сохранения факта.", true);
                }
            } catch (e) {
                showNotification("Ошибка соединения.", true);
            }
        }
    </script>
</body>
</html>
